<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CB911 Reconciliation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f9f8f6;--surface:#fff;--surface-2:#f3f2ef;--border:rgba(0,0,0,.09);--border-strong:rgba(0,0,0,.18);--text:#1a1917;--text-2:#6b6a67;--text-3:#a3a29f;--green:#1a7a4a;--green-bg:#edf7f1;--red:#b92c2c;--red-bg:#fdf0f0;--amber:#92600a;--amber-bg:#fef8ee}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
    nav{background:var(--surface);border-bottom:.5px solid var(--border);padding:0 2rem;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .nav-brand{display:flex;align-items:center;gap:10px}.nav-logo{width:28px;height:28px;background:var(--text);border-radius:6px;display:flex;align-items:center;justify-content:center}.nav-logo svg{width:16px;height:16px;fill:#fff}.nav-title{font-size:13px;font-weight:500}.nav-tag{font-size:11px;color:var(--text-3);font-family:'DM Mono',monospace}
    main{flex:1;max-width:800px;margin:0 auto;width:100%;padding:2.5rem 1.5rem 4rem}
    .step-bar{display:flex;align-items:center;margin-bottom:2.5rem}.step{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-3)}.step.active{color:var(--text)}.step.done{color:var(--green)}.step-num{width:22px;height:22px;border-radius:50%;border:.5px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;font-family:'DM Mono',monospace}.step.active .step-num{background:var(--text);color:#fff;border-color:var(--text)}.step.done .step-num{background:var(--green-bg);color:var(--green);border-color:var(--green)}.step-line{flex:1;height:.5px;background:var(--border);margin:0 10px}
    .card{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1rem}.card-label{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:1.25rem}
    .recon-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.recon-btn{padding:16px;border:.5px solid var(--border);border-radius:10px;background:var(--surface);cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif}.recon-btn:hover:not(.disabled){border-color:var(--border-strong);background:var(--surface-2)}.recon-btn.selected{border:1.5px solid var(--text)}.recon-btn.disabled{opacity:.4;cursor:not-allowed}.rb-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;margin-bottom:8px;font-family:'DM Mono',monospace}.badge-live{background:var(--green-bg);color:var(--green)}.badge-soon{background:var(--surface-2);color:var(--text-3)}.rb-name{font-size:13px;font-weight:500;margin-bottom:3px}.rb-desc{font-size:11px;color:var(--text-2)}
    .btn-primary{width:100%;padding:11px;background:var(--text);color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;margin-top:1rem}.btn-primary:disabled{opacity:.3;cursor:not-allowed}.btn-primary:not(:disabled):hover{opacity:.82}.btn-secondary{padding:8px 16px;background:var(--surface);color:var(--text);border:.5px solid var(--border-strong);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer}.btn-secondary:hover{background:var(--surface-2)}
    .file-list{display:flex;flex-direction:column;gap:7px}.file-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface-2);border:.5px solid var(--border);border-radius:8px}.file-row.valid{border-color:var(--green);background:var(--green-bg)}.file-row.invalid{border-color:var(--red);background:var(--red-bg)}.file-type-badge{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;font-family:'DM Mono',monospace;flex-shrink:0}.xlsx-badge{background:#e8f5e9;color:#2e7d32}.pdf-badge{background:#fce4ec;color:#c62828}.file-info{flex:1;min-width:0}.file-info-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.file-info-sub{font-size:11px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.file-info-err{font-size:11px;color:var(--red);margin-top:2px;line-height:1.3}.file-state{font-size:11px;font-family:'DM Mono',monospace;white-space:nowrap;flex-shrink:0}.state-ok{color:var(--green)}.state-err{color:var(--red)}.state-wait{color:var(--text-3)}.choose-btn{font-size:11px;padding:5px 11px;border:.5px solid var(--border-strong);border-radius:6px;background:var(--surface);cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:'DM Sans',sans-serif}.choose-btn:hover{background:var(--surface-2)}input[type=file]{display:none}
    .progress-wrap{margin-top:1rem}.progress-track{height:2px;background:var(--border);border-radius:2px;overflow:hidden}.progress-fill{height:100%;background:var(--text);border-radius:2px;transition:width .4s ease;width:0}.progress-label{font-size:11px;color:var(--text-2);font-family:'DM Mono',monospace;margin-top:6px}.error-box{margin-top:1rem;padding:12px 14px;background:var(--red-bg);border:.5px solid var(--red);border-radius:8px;color:var(--red);font-size:12px;display:none}
    .summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem}.metric{background:var(--surface-2);border-radius:8px;padding:12px 14px}.metric-label{font-size:10px;color:var(--text-2);margin-bottom:5px}.metric-val{font-size:20px;font-weight:500;font-family:'DM Mono',monospace}.metric-val.green{color:var(--green)}.metric-val.red{color:var(--red)}.metric-val.amber{color:var(--amber)}
    .table-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse;font-size:11px}thead th{text-align:left;font-size:10px;font-weight:500;color:var(--text-2);letter-spacing:.06em;text-transform:uppercase;padding:6px 8px;border-bottom:.5px solid var(--border-strong);white-space:nowrap}tbody td{padding:9px 8px;border-bottom:.5px solid var(--border);font-family:'DM Mono',monospace;white-space:nowrap}tbody tr:last-child td{border-bottom:none;background:var(--surface-2);font-weight:500}.pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-family:'DM Sans',monospace}.pill-ok{background:var(--green-bg);color:var(--green)}.pill-fail{background:var(--red-bg);color:var(--red)}.section-title{font-size:12px;font-weight:500;margin-bottom:1rem;padding-bottom:8px;border-bottom:.5px solid var(--border)}.btn-row{display:flex;gap:8px;margin-top:1.25rem;flex-wrap:wrap}
    footer{text-align:center;font-size:11px;color:var(--text-3);padding:1.5rem;border-top:.5px solid var(--border);background:var(--surface)}
    @media(max-width:600px){.recon-grid{grid-template-columns:1fr}.summary-grid{grid-template-columns:repeat(2,1fr)}nav{padding:0 1rem}main{padding:1.5rem 1rem 3rem}}
  </style>
</head>
<body>
<nav><div class="nav-brand"><div class="nav-logo"><svg viewBox="0 0 20 20"><path d="M10 2L2 6v8l8 4 8-4V6L10 2zm0 2.2l5.5 2.75L10 9.7 4.5 6.95 10 4.2zM3.5 8.3l5.75 2.88V17L3.5 14.13V8.3zm7.25 8.7v-5.82l5.75-2.88v5.83L10.75 17z"/></svg></div><span class="nav-title">CB911 Reconciliation</span></div><span class="nav-tag">Billing Support &middot; Internal</span></nav>
<main>
  <div class="step-bar"><div class="step active" id="step1"><span class="step-num">1</span> Select type</div><div class="step-line"></div><div class="step" id="step2"><span class="step-num">2</span> Upload files</div><div class="step-line"></div><div class="step" id="step3"><span class="step-num">3</span> Results</div></div>
  <div id="phase-select"><div class="card"><div class="card-label">Reconciliation type</div><div class="recon-grid">
    <button class="recon-btn selected" onclick="selectType(this,'revshare')"><div class="rb-badge badge-live">live</div><div class="rb-name">RevShare</div><div class="rb-desc">Net wins &amp; fee validation across entities</div></button>
    <button class="recon-btn" onclick="selectType(this,'attempt_fee')"><div class="rb-badge badge-live">live</div><div class="rb-name">Attempt Fee</div><div class="rb-desc">CB, DNR, Alerts &amp; OI reconciliation</div></button>
    <button class="recon-btn disabled"><div class="rb-badge badge-soon">soon</div><div class="rb-name">Alerts / RDR</div><div class="rb-desc">PRM queries &amp; intercept report</div></button>
  </div></div><button class="btn-primary" onclick="goUpload()">Continue &rarr;</button></div>
  <div id="phase-upload" style="display:none"><div class="card"><div class="card-label" id="files-label">Required files</div><div class="file-list" id="file-list"></div></div><button class="btn-primary" id="run-btn" disabled onclick="runRecon()">Run reconciliation</button><div class="progress-wrap" id="progress-wrap" style="display:none"><div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div><p class="progress-label" id="progress-label"></p></div><div class="error-box" id="error-box"></div></div>
  <div id="phase-results" style="display:none"><div class="summary-grid" id="summary-grid"></div><div class="card"><div class="section-title" id="recon-title">Reconciliation</div><div class="table-wrap"><table id="recon-table"></table></div></div><div class="card"><div class="section-title" id="detail-title">Details</div><div class="table-wrap"><table id="cb-table"></table></div></div><div id="extra-tables"></div><div class="btn-row"><button class="btn-secondary" onclick="downloadExcel()">&#8595; Download Excel report</button><button class="btn-secondary" onclick="resetApp()">&larr; New reconciliation</button></div></div>
</main>
<footer>CB911 Reconciliation Tool &middot; Internal use only</footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
var N8N_URLS={revshare:'/api/recon',attempt_fee:'/api/attempt-fee'};
var RECON_FILES={revshare:[
  {key:'bold_excel',label:'Bold Billing Support',ext:'xlsx',badge:'xlsx',desc:'Current_Month_Revshare_Bold_Billing_Support.xlsx'},
  {key:'petunia_excel',label:'Petunia Billing Support',ext:'xlsx',badge:'xlsx',desc:'Current_Month_Revshare_Petunia_Billing_Support.xlsx'},
  {key:'seventeen_excel',label:'Seventeen Billing Support',ext:'xlsx',badge:'xlsx',desc:'Current_Month_Revshare_Seventeen_Billing_Support.xlsx'},
  {key:'sonaga_excel',label:'Sonaga Billing Support',ext:'xlsx',badge:'xlsx',desc:'Current_Month_Revshare_Sonaga_Billing_Support.xlsx'},
  {key:'bold_pdf',label:'Bold Invoice',ext:'pdf',badge:'pdf',desc:'Revshare_Bold.pdf'},
  {key:'petunia_pdf',label:'Petunia Invoice',ext:'pdf',badge:'pdf',desc:'Revshare_Petunia.pdf'},
  {key:'seventeen_pdf',label:'Seventeen Invoice',ext:'pdf',badge:'pdf',desc:'Revshare_Seventeen.pdf'},
  {key:'sonaga_pdf',label:'Sonaga Invoice',ext:'pdf',badge:'pdf',desc:'Revshare_Sonaga.pdf'},
  {key:'cb_historical',label:'CB Historical',ext:'xlsx',badge:'xlsx',desc:'CB_Historical.xlsx'}
],attempt_fee:[
  {key:'bold_excel',label:'Bold Billing Support',ext:'xlsx',badge:'xlsx',desc:'Current Month Attempt Fees Bold Billing Support.xlsx',required_tabs:['Alerts','Chargebacks','OI Inquiries']},
  {key:'petunia_excel',label:'Petunia Billing Support',ext:'xlsx',badge:'xlsx',desc:'Current Month Attempt Fees Petunia Billing Support.xlsx',required_tabs:['Alerts','Chargebacks','OI Inquiries']},
  {key:'seventeen_excel',label:'Seventeen Billing Support',ext:'xlsx',badge:'xlsx',desc:'Current Month Attempt Fees Seventeen Billing Support.xlsx',required_tabs:['Alerts','Chargebacks','OI Inquiries']},
  {key:'sonaga_excel',label:'Sonaga Billing Support',ext:'xlsx',badge:'xlsx',desc:'Current Month Attempt Fees Sonaga Billing Support.xlsx',required_tabs:['Alerts','Chargebacks','OI Inquiries']},
  {key:'bold_pdf',label:'Bold Invoice',ext:'pdf',badge:'pdf',desc:'Attempt Fee Bold.pdf'},
  {key:'petunia_pdf',label:'Petunia Invoice',ext:'pdf',badge:'pdf',desc:'Attempt Fee Petunia.pdf'},
  {key:'seventeen_pdf',label:'Seventeen Invoice',ext:'pdf',badge:'pdf',desc:'Attempt Fee Seventeen.pdf'},
  {key:'sonaga_pdf',label:'Sonaga Invoice',ext:'pdf',badge:'pdf',desc:'Attempt Fee Sonaga.pdf'},
  {key:'cb_dashboard',label:'CB911 Dashboard',ext:'xlsx',badge:'xlsx',desc:'CB911 Dashboard Python.xlsx',required_cols:['Chargeback ID','Status','Case Type','PreArb']}
]};
var REQUIRED_COLS={billing_support:['CB ID','Billing Identifier','USD Converted Amount','Verdict'],cb_historical:['BILLING_IDENTIFIER','INTERNAL_STATUS','LATEST_CB_STATUS_DATE']};
var selectedRecon='revshare',REQUIRED_FILES=RECON_FILES.revshare,uploaded={},states={},validationErrors={},lastResults=null;
var fmt=function(v){return '$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})};
var fmtN=function(v){return Number(v).toLocaleString('en-US')};
var pill=function(ok){return '<span class="pill '+(ok?'pill-ok':'pill-fail')+'">'+(ok?'match':'diff')+'</span>'};
var pct=function(a,b){return b>0?(a/b*100).toFixed(1)+'%':'—'};
function setStep(n){[1,2,3].forEach(function(i){document.getElementById('step'+i).className='step'+(i<n?' done':i===n?' active':'');})}
function setProgress(p,m){document.getElementById('progress-wrap').style.display='block';document.getElementById('progress-fill').style.width=p+'%';document.getElementById('progress-label').textContent=m}
function selectType(el,type){document.querySelectorAll('.recon-btn:not(.disabled)').forEach(function(b){b.classList.remove('selected')});el.classList.add('selected');selectedRecon=type;REQUIRED_FILES=RECON_FILES[type]}
function goUpload(){document.getElementById('phase-select').style.display='none';document.getElementById('phase-upload').style.display='block';setStep(2);document.getElementById('files-label').textContent=selectedRecon==='attempt_fee'?'Required files — Attempt Fee':'Required files — RevShare';renderFiles()}
function renderFiles(){var h='';for(var i=0;i<REQUIRED_FILES.length;i++){var f=REQUIRED_FILES[i],s=states[f.key]||'',rc=s==='valid'?'valid':s==='invalid'?'invalid':'',sc=s==='valid'?'state-ok':s==='invalid'?'state-err':'state-wait',sl=s==='valid'?'&#10003; valid':s==='invalid'?'&#10007; invalid':s==='validating'?'checking...':'waiting',er=validationErrors[f.key]?'<div class="file-info-err">'+validationErrors[f.key]+'</div>':'';h+='<div class="file-row '+rc+'"><div class="file-type-badge '+f.badge+'-badge">'+f.badge.toUpperCase()+'</div><div class="file-info"><div class="file-info-name">'+f.label+'</div><div class="file-info-sub">'+(uploaded[f.key]?uploaded[f.key].name:f.desc)+'</div>'+er+'</div><span class="file-state '+sc+'">'+sl+'</span><input type="file" id="inp-'+f.key+'" accept=".'+f.ext+'" onchange="handleFile(\''+f.key+'\',this)"><button class="choose-btn" onclick="document.getElementById(\'inp-'+f.key+'\').click()">'+(uploaded[f.key]?'Replace':'Choose')+'</button></div>'}document.getElementById('file-list').innerHTML=h}
function validateExcel(file,cols,tabs){return new Promise(function(res){var r=new FileReader;r.onload=function(e){try{var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});if(tabs&&tabs.length){var mt=tabs.filter(function(t){return wb.SheetNames.indexOf(t)===-1});if(mt.length){res({ok:false,error:'Missing tabs: '+mt.join(', ')});return}}if(cols&&cols.length){var ws=wb.Sheets[wb.SheetNames[0]],rows=XLSX.utils.sheet_to_json(ws,{header:1});if(!rows||rows.length<2){res({ok:false,error:'File appears empty'});return}var hd=rows[0].map(function(h){return String(h||'').trim()}),ms=cols.filter(function(c){return hd.indexOf(c)===-1});if(ms.length){res({ok:false,error:'Missing columns: '+ms.join(', ')});return}}res({ok:true})}catch(err){res({ok:false,error:'Could not read: '+err.message})}};r.readAsArrayBuffer(file)})}
function validatePDF(file){return new Promise(function(res){var r=new FileReader;r.onload=function(e){try{var a=new Uint8Array(e.target.result.slice(0,4)),m=String.fromCharCode.apply(null,a);res(m.startsWith('%PDF')?{ok:true}:{ok:false,error:'Not a valid PDF'})}catch(err){res({ok:false,error:'Could not read PDF'})}};r.readAsArrayBuffer(file)})}
async function handleFile(key,input){var file=input.files[0];if(!file)return;var spec=REQUIRED_FILES.find(function(f){return f.key===key}),ext=file.name.split('.').pop().toLowerCase();if(ext!==spec.ext){states[key]='invalid';validationErrors[key]='Wrong type — expected .'+spec.ext;uploaded[key]=file;renderFiles();checkReady();return}states[key]='validating';uploaded[key]=file;delete validationErrors[key];renderFiles();var result;if(spec.ext==='pdf'){result=await validatePDF(file);if(result.ok){var en=key.replace('_pdf','').toLowerCase();if(!file.name.toLowerCase().includes(en))result={ok:false,error:'Wrong invoice — should contain "'+en+'"'}}if(result.ok&&selectedRecon==='attempt_fee'&&file.name.toLowerCase().includes('revshare'))result={ok:false,error:'This is a RevShare invoice'};if(result.ok&&selectedRecon==='revshare'&&file.name.toLowerCase().includes('attempt'))result={ok:false,error:'This is an Attempt Fee invoice'}}else if(key==='cb_historical'||key==='cb_dashboard'){result=await validateExcel(file,spec.required_cols||REQUIRED_COLS.cb_historical,null)}else if(spec.required_tabs){result=await validateExcel(file,null,spec.required_tabs)}else{result=await validateExcel(file,spec.required_cols||REQUIRED_COLS.billing_support,null);if(result.ok){var eName=key.replace('_excel','').toLowerCase();if(!file.name.toLowerCase().includes(eName))result={ok:false,error:'Wrong file — should contain "'+eName+'"'}}}if(result.ok){states[key]='valid';delete validationErrors[key]}else{states[key]='invalid';validationErrors[key]=result.error}renderFiles();checkReady()}
function checkReady(){document.getElementById('run-btn').disabled=!REQUIRED_FILES.every(function(f){return states[f.key]==='valid'})}
function buildCBLookup(file){return new Promise(function(res){var r=new FileReader;r.onload=function(e){try{var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'}),rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]),lk={};for(var i=0;i<rows.length;i++){var id=String(rows[i].BILLING_IDENTIFIER||'').trim(),st=String(rows[i].INTERNAL_STATUS||'').toLowerCase().trim();if(id&&(!lk[id]||st==='win'))lk[id]=st}res(lk)}catch(x){res({})}};r.readAsArrayBuffer(file)})}
function buildDashboardLookup(file){return new Promise(function(res){var r=new FileReader;r.onload=function(e){try{var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'}),rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]),lk={};for(var i=0;i<rows.length;i++){var id=rows[i]['Chargeback ID'];if(id)lk[id]={status:rows[i].Status||null,caseType:rows[i]['Case Type']||null,preArb:rows[i].PreArb||null}}res(lk)}catch(x){res({})}};r.readAsArrayBuffer(file)})}
function buildBillingSupport(file,entity,dashLookup){return new Promise(function(res){var r=new FileReader;r.onload=function(e){try{var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});var cbWs=wb.Sheets.Chargebacks,cbRows=cbWs?XLSX.utils.sheet_to_json(cbWs):[],tc=cbRows.length,dnr=cbRows.filter(function(r){return r['Do Not Represent']!=null&&r['Do Not Represent']!==''}).length;var df=0,dnf=0,dpa=0;for(var i=0;i<cbRows.length;i++){var id=String(cbRows[i]['CB ID']||'');if(!id)continue;var d=dashLookup[id];if(!d)dnf++;else{df++;if(String(d.preArb||'').toLowerCase()==='yes')dpa++}}var alWs=wb.Sheets.Alerts,alRows=alWs?XLSX.utils.sheet_to_json(alWs):[],ac={Verifi:0,RDR:0,'Order Insight':0,Other:0};for(var j=0;j<alRows.length;j++){var t=alRows[j]['Alert Name']||'Other';if(ac[t]!==undefined)ac[t]++;else ac.Other++}var oiWs=wb.Sheets['OI Inquiries'],oiRows=oiWs?XLSX.utils.sheet_to_json(oiWs):[],oc={OI:0,'CE Lookup':0,'CE Deflection':0};for(var k=0;k<oiRows.length;k++){var tt=oiRows[k]['OI Type']||'';if(oc[tt]!==undefined)oc[tt]++}res({entity:entity,total_cb:tc,dnr:dnr,net_cb:tc-dnr,dash_found:df,dash_not_found:dnf,dash_pre_arbs:dpa,alerts_verifi:ac.Verifi,alerts_rdr:ac.RDR,alerts_oi:ac['Order Insight'],alerts_other:ac.Other,alerts_total:alRows.length,oi_oi:oc.OI,oi_ce_lookup:oc['CE Lookup'],oi_ce_deflection:oc['CE Deflection'],oi_total:oiRows.length})}catch(err){res({entity:entity,error:err.message,total_cb:0,dnr:0,net_cb:0})}};r.readAsArrayBuffer(file)})}
function buildRevShareBilling(file,entity,cbHistLookup){return new Promise(function(res){var r=new FileReader;r.onload=function(e){try{var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'}),rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);var qty=0,net_wins=0,cb_wins=0,cb_losses=0,cb_not_found=0;for(var i=0;i<rows.length;i++){var row=rows[i];var verdict=String(row.Verdict||'').toLowerCase();if(verdict!=='win'&&verdict!=='loss'&&verdict!=='')continue;if(verdict==='win'||verdict==='loss')qty++;if(verdict==='win'){net_wins+=(parseFloat(row['USD Converted Amount'])||0);cb_wins++}else if(verdict==='loss'){cb_losses++}var bid=String(row['Billing Identifier']||'').trim();if(!bid)continue;var hs=cbHistLookup[bid];if(hs===undefined)cb_not_found++}res({entity:entity,qty:qty,net_wins:Math.round(net_wins*100)/100,fee:Math.round(net_wins*0.175*100)/100,cb_wins:cb_wins,cb_losses:cb_losses,cb_not_found:cb_not_found,cb_total:cb_wins+cb_losses})}catch(err){res({entity:entity,error:err.message,qty:0,net_wins:0,fee:0})}};r.readAsArrayBuffer(file)})}
function extractPDFText(file){return new Promise(function(res){var r=new FileReader;r.onload=async function(e){try{if(!window.pdfjsLib){await new Promise(function(ok,fail){var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';s.onload=ok;s.onerror=fail;document.head.appendChild(s)});window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'}var pdf=await window.pdfjsLib.getDocument({data:new Uint8Array(e.target.result)}).promise,txt='';for(var i=1;i<=pdf.numPages;i++){var pg=await pdf.getPage(i),c=await pg.getTextContent();txt+=c.items.map(function(x){return x.str}).join(' ')+'\n'}res(txt)}catch(err){res('')}};r.readAsArrayBuffer(file)})}
async function runRecon(){document.getElementById('run-btn').disabled=true;document.getElementById('error-box').style.display='none';setProgress(10,'Preparing files...');var form=new FormData;if(selectedRecon==='revshare'){setProgress(12,'Processing CB Historical...');var cbLk=await buildCBLookup(uploaded.cb_historical);setProgress(18,'Processing billing support files...');var rsEnts=['bold','petunia','seventeen','sonaga'],rsbd={};for(var ri=0;ri<rsEnts.length;ri++){var ren=rsEnts[ri],rf=uploaded[ren+'_excel'];if(rf)rsbd[ren.charAt(0).toUpperCase()+ren.slice(1)]=await buildRevShareBilling(rf,ren.charAt(0).toUpperCase()+ren.slice(1),cbLk)}setProgress(22,'Extracting invoice text...');var rspt={};for(var rj=0;rj<rsEnts.length;rj++){var rpe=rsEnts[rj],rpf=uploaded[rpe+'_pdf'];if(rpf)rspt[rpe.charAt(0).toUpperCase()+rpe.slice(1)]=await extractPDFText(rpf)}form.append('billing_data_json',JSON.stringify(rsbd));form.append('pdf_texts_json',JSON.stringify(rspt))}else{setProgress(12,'Processing CB911 Dashboard...');var dashLk=await buildDashboardLookup(uploaded.cb_dashboard);setProgress(18,'Processing billing support files...');var ents=['bold','petunia','seventeen','sonaga'],bd={};for(var i=0;i<ents.length;i++){var en=ents[i],f=uploaded[en+'_excel'];if(f)bd[en.charAt(0).toUpperCase()+en.slice(1)]=await buildBillingSupport(f,en.charAt(0).toUpperCase()+en.slice(1),dashLk)}setProgress(22,'Extracting invoice text...');var pt={};for(var j=0;j<ents.length;j++){var pe=ents[j],pf=uploaded[pe+'_pdf'];if(pf)pt[pe.charAt(0).toUpperCase()+pe.slice(1)]=await extractPDFText(pf)}form.append('billing_data_json',JSON.stringify(bd));form.append('pdf_texts_json',JSON.stringify(pt))}form.append('recon_type',selectedRecon);setProgress(30,'Sending to n8n ('+(selectedRecon==='attempt_fee'?'Attempt Fee':'RevShare')+')...');try{var resp=await fetch(N8N_URLS[selectedRecon],{method:'POST',body:form});setProgress(75,'Running reconciliation...');if(!resp.ok)throw new Error('n8n returned '+resp.status+': '+await resp.text());var data=await resp.json();setProgress(100,'Complete.');setTimeout(function(){showResults(data)},350)}catch(err){document.getElementById('progress-wrap').style.display='none';var eb=document.getElementById('error-box');eb.style.display='block';eb.textContent='Error: '+err.message;document.getElementById('run-btn').disabled=false}}
function showResults(data){lastResults=data;document.getElementById('phase-upload').style.display='none';document.getElementById('phase-results').style.display='block';setStep(3);(data.recon_type||selectedRecon)==='attempt_fee'?showAttemptFeeResults(data):showRevShareResults(data)}
function showRevShareResults(data){var rows=data.recon_rows||[],tot=data.totals||{},allOk=tot.qty_match&&tot.net_wins_match&&tot.fee_match,nf=rows.reduce(function(s,r){return s+(r.cb_not_found||0)},0);document.getElementById('summary-grid').innerHTML='<div class="metric"><div class="metric-label">Total invoice amount</div><div class="metric-val">'+fmt(tot.inv_amount||0)+'</div></div><div class="metric"><div class="metric-label">Total cases</div><div class="metric-val">'+fmtN(tot.inv_qty||0)+'</div></div><div class="metric"><div class="metric-label">Overall status</div><div class="metric-val '+(allOk?'green':'red')+'">'+(allOk?'Matched':'Discrepancy')+'</div></div><div class="metric"><div class="metric-label">Unmatched in history</div><div class="metric-val '+(nf>0?'amber':'green')+'">'+fmtN(nf)+'</div></div>';document.getElementById('recon-title').textContent='Invoice vs internal — RevShare';var all=rows.concat([Object.assign({},tot,{entity:'Total',invoice_no:''})]);document.getElementById('recon-table').innerHTML='<thead><tr><th>Entity</th><th>Invoice #</th><th>Inv. cases</th><th>Int. cases</th><th>Qty</th><th>Inv. net wins</th><th>Int. net wins</th><th>Wins</th><th>Inv. fee</th><th>Int. fee</th><th>Fee</th></tr></thead><tbody>'+all.map(function(r){return '<tr><td>'+r.entity+'</td><td style="color:var(--text-2)">'+(r.invoice_no||'—')+'</td><td>'+fmtN(r.inv_qty||0)+'</td><td>'+fmtN(r.int_qty||0)+'</td><td>'+pill(r.qty_match)+'</td><td>'+fmt(r.inv_net_wins||0)+'</td><td>'+fmt(r.int_net_wins||0)+'</td><td>'+pill(r.net_wins_match)+'</td><td>'+fmt(r.inv_amount||0)+'</td><td>'+fmt(r.int_fee||0)+'</td><td>'+pill(r.fee_match)+'</td></tr>'}).join('')+'</tbody>';document.getElementById('detail-title').textContent='Billing identifier match — CB Historical';document.getElementById('cb-table').innerHTML='<thead><tr><th>Entity</th><th>Wins</th><th>Losses</th><th>Not found</th><th>Total</th><th>Match rate</th></tr></thead><tbody>'+all.map(function(r){return '<tr><td>'+r.entity+'</td><td style="color:var(--green)">'+fmtN(r.cb_wins||0)+'</td><td style="color:var(--red)">'+fmtN(r.cb_losses||0)+'</td><td style="color:var(--amber)">'+fmtN(r.cb_not_found||0)+'</td><td>'+fmtN(r.cb_total||0)+'</td><td>'+pct((r.cb_wins||0)+(r.cb_losses||0),r.cb_total||0)+'</td></tr>'}).join('')+'</tbody>';document.getElementById('extra-tables').innerHTML=''}
function showAttemptFeeResults(data){var rows=data.recon_rows||[],tot=data.totals||{},allOk=rows.every(function(r){return r.cb_match&&r.dnr_match}),all=rows.concat([Object.assign({},tot,{entity:'Total',invoice_no:''})]);document.getElementById('summary-grid').innerHTML='<div class="metric"><div class="metric-label">Total invoice amount</div><div class="metric-val">'+fmt(tot.total_due||0)+'</div></div><div class="metric"><div class="metric-label">Total net CB</div><div class="metric-val">'+fmtN(tot.int_net_cb||0)+'</div></div><div class="metric"><div class="metric-label">Overall CB status</div><div class="metric-val '+(allOk?'green':'red')+'">'+(allOk?'Matched':'Discrepancy')+'</div></div><div class="metric"><div class="metric-label">Entities with issues</div><div class="metric-val '+((tot.issues||0)>0?'red':'green')+'">'+fmtN(tot.issues||0)+'</div></div>';document.getElementById('recon-title').textContent='Chargeback reconciliation — Attempt Fee';document.getElementById('recon-table').innerHTML='<thead><tr><th>Entity</th><th>Invoice #</th><th>Total Due</th><th>Inv CB</th><th>Int CB</th><th>CB</th><th>Inv DNR</th><th>Int DNR</th><th>DNR</th><th>Inv Net</th><th>Int Net</th><th>Net</th></tr></thead><tbody>'+all.map(function(r){return '<tr><td>'+r.entity+'</td><td style="color:var(--text-2)">'+(r.invoice_no||'—')+'</td><td>'+fmt(r.total_due||0)+'</td><td>'+fmtN(r.inv_cb||0)+'</td><td>'+fmtN(r.int_cb||0)+'</td><td>'+pill(r.cb_match)+'</td><td>'+fmtN(r.inv_dnr||0)+'</td><td>'+fmtN(r.int_dnr||0)+'</td><td>'+pill(r.dnr_match)+'</td><td>'+fmtN(r.inv_net_cb||0)+'</td><td>'+fmtN(r.int_net_cb||0)+'</td><td>'+pill(r.net_cb_match)+'</td></tr>'}).join('')+'</tbody>';document.getElementById('detail-title').textContent='Alerts & OI breakdown';document.getElementById('cb-table').innerHTML='<thead><tr><th>Entity</th><th>Verifi</th><th>RDR</th><th>Order Insight</th><th>Other</th><th>Total Alerts</th><th>OI</th><th>CE Lookup</th><th>CE Defl.</th><th>Total OI</th></tr></thead><tbody>'+rows.map(function(r){return '<tr><td>'+r.entity+'</td><td>'+fmtN(r.int_alerts_verifi||0)+'</td><td>'+fmtN(r.int_alerts_rdr||0)+'</td><td>'+fmtN(r.int_alerts_oi||0)+'</td><td>'+fmtN(r.int_alerts_other||0)+'</td><td style="font-weight:500">'+fmtN(r.int_alerts_total||0)+'</td><td>'+fmtN(r.int_oi_oi||0)+'</td><td>'+fmtN(r.int_oi_ce_lookup||0)+'</td><td>'+fmtN(r.int_oi_ce_deflection||0)+'</td><td style="font-weight:500">'+fmtN(r.int_oi_total||0)+'</td></tr>'}).join('')+'</tbody>';document.getElementById('extra-tables').innerHTML='<div class="card"><div class="section-title">CB911 Dashboard match — billed CB IDs</div><div class="table-wrap"><table><thead><tr><th>Entity</th><th>Found</th><th>Not Found</th><th>Pre-Arbs</th><th>Total CB</th><th>Match Rate</th></tr></thead><tbody>'+all.map(function(r){return '<tr><td>'+r.entity+'</td><td style="color:var(--green)">'+fmtN(r.dash_found||0)+'</td><td style="color:var(--red)">'+fmtN(r.dash_not_found||0)+'</td><td style="color:var(--amber)">'+fmtN(r.dash_pre_arbs||0)+'</td><td>'+fmtN(r.int_cb||0)+'</td><td>'+((r.int_cb||0)>0?((r.dash_found||0)/(r.int_cb)*100).toFixed(1)+'%':'—')+'</td></tr>'}).join('')+'</tbody></table></div></div>'}
function downloadExcel(){if(!lastResults)return;var rows=lastResults.recon_rows||[],tot=lastResults.totals||{},wb=XLSX.utils.book_new();if(lastResults.recon_type==='attempt_fee'){var s=[['Entity','Invoice #','Total Due','Inv CB','Int CB','CB Match','Inv DNR','Int DNR','DNR Match','Inv Net CB','Int Net CB','Net Match','Dash Found','Dash Not Found','Pre-Arbs','Alerts Total','OI Total']];rows.forEach(function(r){s.push([r.entity,r.invoice_no,r.total_due,r.inv_cb,r.int_cb,r.cb_match?'Yes':'No',r.inv_dnr,r.int_dnr,r.dnr_match?'Yes':'No',r.inv_net_cb,r.int_net_cb,r.net_cb_match?'Yes':'No',r.dash_found,r.dash_not_found,r.dash_pre_arbs,r.int_alerts_total,r.int_oi_total])});XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s),'Attempt Fee Recon')}else{var s2=[['Entity','Invoice #','Inv Cases','Int Cases','Qty Match','Inv Net Wins','Int Net Wins','Wins Match','Inv Fee','Int Fee','Fee Match']];rows.forEach(function(r){s2.push([r.entity,r.invoice_no,r.inv_qty,r.int_qty,r.qty_match?'Yes':'No',r.inv_net_wins,r.int_net_wins,r.net_wins_match?'Yes':'No',r.inv_amount,r.int_fee,r.fee_match?'Yes':'No'])});XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s2),'RevShare Recon')}XLSX.writeFile(wb,'CB911_Recon_'+new Date().toISOString().slice(0,10)+'.xlsx')}
function resetApp(){Object.keys(uploaded).forEach(function(k){delete uploaded[k]});Object.keys(states).forEach(function(k){delete states[k]});Object.keys(validationErrors).forEach(function(k){delete validationErrors[k]});lastResults=null;document.getElementById('extra-tables').innerHTML='';document.getElementById('phase-results').style.display='none';document.getElementById('phase-select').style.display='block';document.getElementById('progress-wrap').style.display='none';document.getElementById('error-box').style.display='none';setStep(1)}
